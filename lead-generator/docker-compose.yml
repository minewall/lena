services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadgen}
      POSTGRES_DB: ${POSTGRES_DB:-leadgen}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadgen}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./reports:/app/reports
    # Sobe e fica disponível para rodar comandos:
    #   docker compose run --rm app init-db
    #   docker compose run --rm app search --segment all
    #   docker compose run --rm app export
    #   docker compose run --rm app report
    command: ["--help"]

volumes:
  pgdata:

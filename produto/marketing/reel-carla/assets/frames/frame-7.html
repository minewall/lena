<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Frame 7 — Fechamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #2b2b2b; }
  .screen { width: 540px; height: 960px; background: #FBF3E7; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: 'Hanken Grotesk', sans-serif; padding: 70px 40px 56px; }

  .exchange { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .bubble { max-width: 86%; padding: 11px 14px 8px; box-shadow: 0 1px 1px rgba(70,50,30,.10); font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
  .bubble .txt { font-size: 19px; color: #111b21; line-height: 1.4; }
  .row { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 3px; }
  .row .time { font-size: 13px; color: #667781; }
  .sent { align-self: flex-end; background: #D9FDD3; border-radius: 16px 16px 5px 16px; }
  .sent .check { font-size: 18px; color: #34B7F1; }
  .recv { align-self: flex-start; display: flex; align-items: flex-end; gap: 9px; max-width: 92%; }
  .recv .av { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; }
  .recv .body { background: #fff; border-radius: 16px 16px 16px 5px; padding: 11px 14px 8px; box-shadow: 0 1px 1px rgba(70,50,30,.10); }

  .tagline { margin-top: auto; text-align: center; }
  .tagline .l1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 400; font-size: 25px; color: #4a3a2c; line-height: 1.32; }
  .tagline .l2 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 46px; color: #E35B2E; line-height: 1.05; margin-top: 12px; letter-spacing: -.5px; }

  .foot { margin-top: 44px; text-align: center; }
  .word { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 34px; color: #3a2c20; letter-spacing: -.5px; }
  .word .dot { color: #E35B2E; }
  .url { font-family: 'Hanken Grotesk', sans-serif; font-size: 18px; color: #998a78; margin-top: 6px; letter-spacing: .3px; }
</style>
</head>
<body>
  <div class="screen">

    <div class="exchange">
      <div class="bubble sent">
        <div class="txt">Oi! Preciso marcar uma sessão, vocês têm horário?</div>
        <div class="row"><span class="time">21:42</span><i class="ti ti-checks check"></i></div>
      </div>
      <div class="recv">
        <img class="av" src="lena-avatar.png" alt="Lena" />
        <div class="body">
          <div class="txt">Oi, Carla! Tenho 7h ou 7h30 amanhã. Qual prefere?</div>
          <div class="row"><span class="time">21:42</span></div>
        </div>
      </div>
    </div>

    <div class="tagline">
      <div class="l1">Seus clientes não têm hora<br/>pra querer agendar.</div>
      <div class="l2">Eu também não.</div>
    </div>

    <div class="foot">
      <div class="word">lena<span class="dot">.</span></div>
      <div class="url">lena.ia.br</div>
    </div>

  </div>
</body>
</html>

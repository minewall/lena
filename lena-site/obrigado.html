<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mensagem enviada</title>
<meta name="description" content="Sua mensagem chegou. Em breve falamos com você no WhatsApp." />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#D9613A" />
<link rel="icon" href="/assets/lena-selo.svg" type="image/svg+xml" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#D9613A" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --primary:#D9613A; --primary-dark:#B84A28; --secondary:#F2A93C; --accent:#4E9E78;
    --grad: linear-gradient(135deg, #D9613A 0%, #F2A93C 100%);
    --dark:#241B15; --body:#6B5D4F; --muted:#897866; --line:#E8DFD0;
    --bg:#FBF3E7; --bg-2:#FFFAF0; --white:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg-2);color:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  h1{font-family:'Bricolage Grotesque',sans-serif;color:var(--dark);font-weight:800;line-height:1.1;letter-spacing:-.025em}
  a{color:var(--primary);text-decoration:none}

  nav{padding:22px 28px;background:var(--white);border-bottom:1px solid var(--line)}
  .nav-in{max-width:1100px;margin:0 auto;display:flex;align-items:center}
  .logo{display:inline-flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.55rem;letter-spacing:-.03em;color:var(--dark)}
  .logo-mark{width:36px;height:36px;border-radius:9px;flex:none;display:block;box-shadow:0 8px 20px -8px rgba(217,97,58,.45)}
  .logo .dot{color:#4E9E78;margin-left:-.1em}

  main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;position:relative;overflow:hidden}
  main::before{content:"";position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(217,97,58,.15),transparent 70%);z-index:0}
  main::after{content:"";position:absolute;bottom:-300px;left:-200px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(242,169,60,.12),transparent 70%);z-index:0}
  .card{position:relative;z-index:1;background:var(--white);border:1px solid var(--line);border-radius:24px;padding:56px 48px;max-width:560px;width:100%;text-align:center;box-shadow:0 30px 70px -30px rgba(36,27,21,.18)}
  .check{width:84px;height:84px;border-radius:50%;background:var(--grad);display:grid;place-items:center;margin:0 auto 28px;box-shadow:0 14px 30px -10px rgba(217,97,58,.5);animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  .check svg{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .4s ease forwards .3s}
  @keyframes draw{to{stroke-dashoffset:0}}
  h1{font-size:clamp(1.8rem,4vw,2.6rem);margin-bottom:14px}
  .lead{color:var(--body);font-size:1.08rem;margin-bottom:32px;max-width:42ch;margin-left:auto;margin-right:auto}
  .lead b{color:var(--dark);font-weight:600}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:10px;font-weight:600;font-size:.96rem;background:var(--grad);color:#fff;box-shadow:0 10px 24px -10px rgba(217,97,58,.55);transition:all .2s;font-family:'Hanken Grotesk',sans-serif}
  .btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px -10px rgba(217,97,58,.65)}
  .meta{margin-top:32px;padding-top:24px;border-top:1px solid var(--line);color:var(--muted);font-size:.88rem}
  .meta a{color:var(--primary);font-weight:500}

  footer{padding:22px 28px;text-align:center;color:var(--muted);font-size:.84rem;border-top:1px solid var(--line);background:var(--white)}

  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <a href="/" class="logo" aria-label="Lena, ir para a página inicial">
      <img src="/assets/lena-selo.svg" alt="" width="36" height="36" class="logo-mark" />
      Lena<span class="dot">.</span>
    </a>
  </div>
</nav>

<main>
  <div class="card">
    <div class="check">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 8"/></svg>
    </div>
    <h1>Mensagem recebida.</h1>
    <p class="lead">Em breve <b>uma pessoa</b> responde no seu WhatsApp. Normalmente em poucas horas, em dias úteis.</p>
    <a href="/" class="btn">Voltar para o site</a>
    <div class="meta">
      Preferiu por email? Escreva para <a href="mailto:contato@lena.ia.br">contato@lena.ia.br</a>
    </div>
  </div>
</main>

<footer>© 2026 Lena, <a href="/privacidade.html" style="color:var(--muted)">Privacidade</a>, <a href="/termos.html" style="color:var(--muted)">Termos</a></footer>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --cream:#FBF3E7; --cafe:#241B15; --soft:#897866; --terra:#D9613A; --salvia:#4E9E78; --hairline:rgba(36,27,21,.12); --display:'Bricolage Grotesque',sans-serif; --text:'Hanken Grotesk',sans-serif; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{ font-family:var(--text); background:var(--cream); height:100vh; position:relative; color:var(--cafe); }
  .label{ position:absolute; top:30px; left:36px; color:var(--soft); font-size:14px; }
  .note{ position:absolute; top:30px; left:36px; }

  /* ===== Botão flutuante (versão recomendada) ===== */
  .wa-fab{ position:fixed; right:26px; bottom:26px; z-index:50; display:inline-flex; align-items:center; gap:12px;
    background:#fff; border:1px solid var(--hairline); border-radius:999px; padding:8px 20px 8px 8px;
    box-shadow:0 18px 44px -16px rgba(36,27,21,.4); text-decoration:none; }
  .wa-fab .av{ position:relative; width:48px; height:48px; flex:none; }
  .wa-fab .av img{ width:48px; height:48px; border-radius:50%; object-fit:cover; display:block; }
  .wa-fab .av .wbadge{ position:absolute; right:-2px; bottom:-2px; width:20px; height:20px; border-radius:50%; background:#25D366; border:2px solid #fff; display:flex; align-items:center; justify-content:center; }
  .wa-fab .av .wbadge svg{ width:12px; height:12px; fill:#fff; }
  .wa-fab .tx b{ font-family:var(--display); font-weight:800; font-size:15px; color:var(--cafe); display:block; line-height:1.1; }
  .wa-fab .tx span{ font-size:12px; color:var(--salvia); font-weight:700; display:inline-flex; align-items:center; gap:5px; margin-top:2px; }
  .wa-fab .tx span i{ width:7px; height:7px; border-radius:50%; background:var(--salvia); display:inline-block; }

  /* balão proativo (opcional) */
  .nudge{ position:fixed; right:26px; bottom:96px; z-index:49; background:#fff; border:1px solid var(--hairline);
    border-radius:16px 16px 4px 16px; padding:12px 15px; box-shadow:0 18px 40px -18px rgba(36,27,21,.4); max-width:230px; font-size:13.5px; line-height:1.4; }
  .nudge b{ font-family:var(--display); }
  .nudge .x{ position:absolute; top:-8px; left:-8px; width:22px; height:22px; border-radius:50%; background:var(--cafe); color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
  <div class="note">
    <div class="label">↘ Botão flutuante (canto inferior direito) — acompanha a rolagem o tempo todo</div>
  </div>

  <!-- balão proativo opcional -->
  <div class="nudge"><span class="x">×</span>Oi! 😊 Qualquer dúvida sobre a Lena, é só me chamar aqui.</div>

  <!-- botão -->
  <a class="wa-fab" href="#">
    <span class="av">
      <img src="assets/lena-avatar-1024.png" alt="Lena">
      <span class="wbadge"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2Z"/></svg></span>
    </span>
    <span class="tx"><b>Fale com a Lena</b><span><i></i>online agora</span></span>
  </a>
</body>
</html>
